<section id="contact" class="py-16 sm:py-20 bg-gradient-to-b from-[#120d09] to-[#070a12] text-white">
  <div class="container mx-auto px-4 sm:px-6">
    <!-- Section Header -->
    <div class="text-center mb-12 sm:mb-16">
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold text-neutral-100 mb-4 font-outfit">Contact</h2>
      <div class="w-20 sm:w-24 h-1 bg-gradient-to-r from-amber-600 to-orange-500 mx-auto mb-4 sm:mb-6"></div>
      <p class="text-base sm:text-lg text-neutral-300 max-w-2xl mx-auto px-2 font-outfit">
        Get in touch with me. Send your message and I'll respond as soon as possible
      </p>
    </div>

    <div class="grid lg:grid-cols-2 gap-8 lg:gap-12 max-w-6xl mx-auto items-stretch">
      <!-- Contact Information -->
      <div class="space-y-6 sm:space-y-8 flex flex-col justify-between">
        <div class="bg-neutral-900/40 rounded-2xl p-6 sm:p-8 border border-amber-950/15 backdrop-blur-md shadow-xl flex-grow flex flex-col justify-between">
          <div>
            <h3 class="text-xl sm:text-2xl font-bold text-amber-500 mb-6 font-outfit">Get In Touch</h3>
            
            <div class="space-y-6">
              <!-- Location -->
              <div class="flex items-start space-x-4">
                <div class="flex-shrink-0">
                  <div class="w-12 h-12 bg-gradient-to-r from-amber-600 to-orange-500 rounded-full flex items-center justify-center shadow-[0_0_10px_rgba(217,119,6,0.3)]">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                  </div>
                </div>
                <div class="min-w-0 flex-1">
                  <h4 class="text-base sm:text-lg font-semibold text-neutral-200 mb-1 font-outfit">Location</h4>
                  <p class="text-neutral-450 text-sm sm:text-base font-outfit">{{ contactInfo.location }}</p>
                </div>
              </div>

              <!-- Email -->
              <div class="flex items-start space-x-4">
                <div class="flex-shrink-0">
                  <div class="w-12 h-12 bg-gradient-to-r from-amber-600 to-orange-500 rounded-full flex items-center justify-center shadow-[0_0_10px_rgba(217,119,6,0.3)]">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                      </path>
                    </svg>
                  </div>
                </div>
                <div class="min-w-0 flex-1">
                  <h4 class="text-base sm:text-lg font-semibold text-neutral-200 mb-1 font-outfit">Email</h4>
                  <a href="mailto:{{ contactInfo.email }}"
                    class="text-orange-400 hover:text-amber-500 transition-colors text-sm sm:text-base break-all font-outfit">
                    {{ contactInfo.email }}
                  </a>
                </div>
              </div>
            </div>
          </div>

          <!-- Social Links -->
          <div class="mt-8 pt-6 border-t border-amber-950/20">
            <h4 class="text-base sm:text-lg font-semibold text-neutral-300 mb-4 font-outfit">Follow Me</h4>
            <div class="flex flex-wrap gap-4">
              <a href="https://x.com/add1283" target="_blank"
                class="w-10 h-10 bg-neutral-800 rounded-full flex items-center justify-center text-neutral-300 hover:text-white hover:bg-amber-600 transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                </svg>
              </a>
              <a href="https://github.com/add1283" target="_blank"
                class="w-10 h-10 bg-neutral-800 rounded-full flex items-center justify-center text-neutral-300 hover:text-white hover:bg-amber-600 transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
              </a>
              <a href="https://www.linkedin.com/in/ahmet-deniz-dündar-218a3b198/" target="_blank"
                class="w-10 h-10 bg-neutral-800 rounded-full flex items-center justify-center text-neutral-300 hover:text-white hover:bg-amber-600 transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                </svg>
              </a>
              <a href="https://www.threads.net/@add.1283" target="_blank"
                class="w-10 h-10 bg-neutral-800 rounded-full flex items-center justify-center text-neutral-300 hover:text-white hover:bg-amber-600 transition-colors">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M13.621 11.833c0 .546-.388.948-.944.948h-.024c-.546 0-.948-.388-.948-.944v-.024c0-.546.388-.948.944-.948h.024c.546 0 .948.388.948.944v.024zm4.721 1.792c-.221.77-.674 1.341-1.298 1.541-.424.129-.908.118-1.405-.035-.51-.154-1.066-.481-1.542-.916-1.312 1.01-2.583 1.47-3.611 1.314-.77-.116-1.347-.591-1.618-1.336-.255-.7-.2-.158.158-2.48.514-1.285 1.512-2.32 2.67-2.774.59-.232 1.157-.327 1.68-.285.782.062 1.394.437 1.727 1.052.149-.135.301-.262.456-.378.175-.131.365-.254.563-.363.388-.212.791-.331 1.188-.352.375-.02.729.095 1.02.331.309.251.476.635.476 1.109 0 .987-.596 2.008-1.634 2.8-.108.648-.346 1.238-.708 1.757v.001zm-2.964-1.724c.108-.592.255-1.146.439-1.647-.207.097-.403.212-.584.34-.159.112-.315.239-.467.379a10.32 10.32 0 00-.586 1.753c.389.364.804.618 1.198.781zm-1.618-2.609c-.387-.038-.802.035-1.22.21-1.077.452-2.013 1.44-2.489 2.628-.314.783-.346 1.485-.098 1.942.157.29.479.469.897.495.772.049 1.776-.39 2.766-1.221.218-.182.441-.383.665-.596-.135-.572-.218-1.21-.221-1.892zM12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 18.25c-3.452 0-6.25-2.798-6.25-6.25S8.548 5.75 12 5.75s6.25 2.798 6.25 6.25-2.798 6.25-6.25 6.25z"/>
                </svg>
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="bg-neutral-900/40 rounded-2xl shadow-xl p-6 sm:p-8 border border-amber-950/15 backdrop-blur-md flex flex-col justify-between">
        <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="space-y-4 sm:space-y-5">
          <!-- Name Field -->
          <div>
            <label for="name" class="block text-sm font-semibold text-neutral-300 mb-2 font-outfit">Your Name</label>
            <input type="text" id="name" name="name" [(ngModel)]="formData.name" required
              class="w-full px-4 py-2.5 sm:py-3 bg-neutral-950/50 border border-amber-950/30 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-all duration-200 outline-none text-sm sm:text-base text-neutral-200 placeholder-neutral-600 font-outfit"
              placeholder="Enter your name">
          </div>

          <!-- Email Field -->
          <div>
            <label for="email" class="block text-sm font-semibold text-neutral-300 mb-2 font-outfit">Your Email</label>
            <input type="email" id="email" name="email" [(ngModel)]="formData.email" required
              class="w-full px-4 py-2.5 sm:py-3 bg-neutral-950/50 border border-amber-950/30 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-all duration-200 outline-none text-sm sm:text-base text-neutral-200 placeholder-neutral-600 font-outfit"
              placeholder="Enter your email">
          </div>

          <!-- Subject Field -->
          <div>
            <label for="subject" class="block text-sm font-semibold text-neutral-300 mb-2 font-outfit">Subject</label>
            <input type="text" id="subject" name="subject" [(ngModel)]="formData.subject" required
              class="w-full px-4 py-2.5 sm:py-3 bg-neutral-950/50 border border-amber-950/30 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-all duration-200 outline-none text-sm sm:text-base text-neutral-200 placeholder-neutral-600 font-outfit"
              placeholder="Enter subject">
          </div>

          <!-- Message Field -->
          <div>
            <label for="message" class="block text-sm font-semibold text-neutral-300 mb-2 font-outfit">Message</label>
            <textarea id="message" name="message" [(ngModel)]="formData.message" required rows="4"
              class="w-full px-4 py-2.5 sm:py-3 bg-neutral-950/50 border border-amber-950/30 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-all duration-200 outline-none resize-none text-sm sm:text-base text-neutral-200 placeholder-neutral-600 font-outfit"
              placeholder="Write your message"></textarea>
          </div>

          <!-- Status Messages -->
          <div class="space-y-3">
            <!-- Loading -->
            <div *ngIf="isLoading" class="flex items-center justify-center py-2">
              <div class="animate-spin rounded-full h-5.5 w-5.5 border-b-2 border-amber-500"></div>
              <span class="ml-2.5 text-amber-500 text-sm sm:text-base font-outfit">Sending...</span>
            </div>

            <!-- Success -->
            <div *ngIf="showSuccess" class="bg-green-950/35 border border-green-900/30 rounded-lg p-3 sm:p-4 status-message">
              <div class="flex items-center">
                <svg class="w-5 h-5 text-green-500 mr-2.5 flex-shrink-0" fill="currentColor"
                  viewBox="0 0 20 20">
                  <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd"></path>
                </svg>
                <span class="text-green-300 font-medium text-sm sm:text-base font-outfit">Your message has been sent successfully!</span>
              </div>
            </div>

            <!-- Error -->
            <div *ngIf="showError" class="bg-red-950/35 border border-red-900/30 rounded-lg p-3 sm:p-4 status-message">
              <div class="flex items-center">
                <svg class="w-5 h-5 text-red-500 mr-2.5 flex-shrink-0" fill="currentColor"
                  viewBox="0 0 20 20">
                  <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                    clip-rule="evenodd"></path>
                </svg>
                <span class="text-red-300 font-medium text-sm sm:text-base font-outfit">{{ errorMessage }}</span>
              </div>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" [disabled]="isLoading || !contactForm.form.valid"
            class="w-full bg-gradient-to-r from-amber-600 to-orange-500 text-white font-semibold py-3 sm:py-4 px-4 sm:px-6 rounded-lg hover:from-amber-700 hover:to-orange-600 transform hover:scale-[1.02] transition-all duration-300 shadow-lg hover:shadow-orange-500/20 disabled:opacity-40 disabled:cursor-not-allowed disabled:transform-none text-sm sm:text-base font-outfit">
            <span *ngIf="!isLoading">Send Message</span>
            <span *ngIf="isLoading">Sending...</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
