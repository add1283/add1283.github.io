<!-- Fixed Navigation Header -->
<header class="fixed top-0 left-0 right-0 z-50 bg-neutral-950/70 backdrop-blur-md shadow-lg border-b border-amber-950/20 text-white">
  <nav class="container mx-auto px-4 sm:px-6 py-3 sm:py-4">
    <div class="flex items-center justify-between">
      <!-- Logo/Brand -->
      <a href="#hero"
        class="flex items-center space-x-2 sm:space-x-3 hover:opacity-80 transition-opacity cursor-pointer logo-hover"
        (click)="smoothScrollTo($event, 'hero')">
        <div
          class="w-8 h-8 sm:w-10 sm:h-10 bg-gradient-to-r from-amber-600 to-orange-500 rounded-full flex items-center justify-center shadow-lg shadow-orange-500/20">
          <span class="text-white font-bold text-sm sm:text-lg">AD</span>
        </div>
        <span class="text-lg sm:text-xl font-bold text-neutral-100 font-outfit">Ahmet Deniz Dündar</span>
      </a>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8">
        <a href="#hero" class="nav-link active text-neutral-300 hover:text-amber-500 transition-colors" (click)="smoothScrollTo($event, 'hero')">Home</a>
        <a href="#skills" class="nav-link text-neutral-300 hover:text-amber-500 transition-colors" (click)="smoothScrollTo($event, 'skills')">Skills</a>
        <a href="#resume" class="nav-link text-neutral-300 hover:text-amber-500 transition-colors" (click)="smoothScrollTo($event, 'resume')">Resume</a>
        <a href="#portfolio" class="nav-link text-neutral-300 hover:text-amber-500 transition-colors" (click)="smoothScrollTo($event, 'portfolio')">Portfolio</a>
        <a href="#contact" class="nav-link text-neutral-300 hover:text-amber-500 transition-colors" (click)="smoothScrollTo($event, 'contact')">Contact</a>
      </div>

      <!-- Mobile Menu Button -->
      <button class="md:hidden p-2 rounded-lg hover:bg-neutral-800/80 transition-colors text-neutral-300 relative z-[10000]"
        (click)="toggleMobileMenu()">
        <svg class="w-5 h-5 sm:w-6 sm:h-6 text-neutral-300 transition-transform duration-300" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path *ngIf="!isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16" class="transition-opacity duration-300"></path>
          <path *ngIf="isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M6 18L18 6M6 6l12 12" class="transition-opacity duration-300"></path>
        </svg>
      </button>
    </div>
  </nav>
</header>

<!-- Mobile Navigation Panel - Full Screen Overlay -->
<div
  class="fixed top-[57px] sm:top-[65px] left-0 w-full bg-neutral-950/95 backdrop-blur-lg border-t border-amber-950/20 z-40 md:hidden overflow-hidden transition-transform duration-300 ease-in-out transform"
  style="height: calc(100dvh - 57px);" [class.translate-x-full]="!isMobileMenuOpen">

  <!-- Mobile Navigation Content -->
  <div class="flex flex-col h-full bg-neutral-950 overflow-y-auto">
    <!-- Navigation Links -->
    <div class="flex-1 p-6">
      <div class="flex flex-col space-y-4">
        <a href="#hero" class="mobile-nav-link text-xl py-3 border-b border-amber-950/10"
          (click)="smoothScrollTo($event, 'hero'); closeMobileMenu()">
          <div class="flex items-center space-x-4">
            <div class="w-2.5 h-2.5 bg-amber-500 rounded-full shadow-[0_0_8px_#f59e0b]"></div>
            <span class="font-semibold text-neutral-200">Home</span>
          </div>
        </a>

        <a href="#skills" class="mobile-nav-link text-xl py-3 border-b border-amber-950/10"
          (click)="smoothScrollTo($event, 'skills'); closeMobileMenu()">
          <div class="flex items-center space-x-4">
            <div class="w-2.5 h-2.5 bg-amber-500 rounded-full shadow-[0_0_8px_#f59e0b]"></div>
            <span class="font-semibold text-neutral-200">Skills</span>
          </div>
        </a>
        <a href="#resume" class="mobile-nav-link text-xl py-3 border-b border-amber-950/10"
          (click)="smoothScrollTo($event, 'resume'); closeMobileMenu()">
          <div class="flex items-center space-x-4">
            <div class="w-2.5 h-2.5 bg-amber-500 rounded-full shadow-[0_0_8px_#f59e0b]"></div>
            <span class="font-semibold text-neutral-200">Resume</span>
          </div>
        </a>
        <a href="#portfolio" class="mobile-nav-link text-xl py-3 border-b border-amber-950/10"
          (click)="smoothScrollTo($event, 'portfolio'); closeMobileMenu()">
          <div class="flex items-center space-x-4">
            <div class="w-2.5 h-2.5 bg-amber-500 rounded-full shadow-[0_0_8px_#f59e0b]"></div>
            <span class="font-semibold text-neutral-200">Portfolio</span>
          </div>
        </a>
        <a href="#contact" class="mobile-nav-link text-xl py-3 border-b border-amber-950/10"
          (click)="smoothScrollTo($event, 'contact'); closeMobileMenu()">
          <div class="flex items-center space-x-4">
            <div class="w-2.5 h-2.5 bg-orange-600 rounded-full shadow-[0_0_8px_#ea580c]"></div>
            <span class="font-semibold text-neutral-200">Contact</span>
          </div>
        </a>
      </div>
    </div>
